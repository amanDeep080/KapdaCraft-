<!DOCTYPE html>
<html>
<head>
<title>KapdaCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.chat-box {
  height: 250px;
  overflow-y: auto;
  background: #f8f9fa;
  padding: 10px;
  border-radius: 10px;
}

.msg-left {
  text-align: left;
  background: #e2e3e5;
  padding: 5px 10px;
  border-radius: 10px;
  margin-bottom: 5px;
  display: inline-block;
}

.msg-right {
  text-align: right;
  background: #0d6efd;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
  margin-bottom: 5px;
  display: inline-block;
}
</style>
</head>

<body class="bg-light">
<div class="container py-4">

<h2>👗 KapdaCraft</h2>

<!-- Fabric Suggestion -->
<div class="card p-3 mb-3">
<h5>Fabric Suggestion</h5>
<input id="desc" class="form-control mb-2" placeholder="Describe fabric">
<input id="imgUrl" class="form-control mb-2" placeholder="Image URL (optional)">
<button class="btn btn-dark" onclick="ask()">Get Suggestion</button>
<div id="suggestion" class="mt-2 fw-bold"></div>
</div>

<!-- History with Image Preview -->
<div class="card p-3 mb-3">
<div class="d-flex justify-content-between">
<h5>History</h5>
<button class="btn btn-sm btn-outline-primary" onclick="loadHistory()">Refresh</button>
</div>
<div id="history"></div>
</div>

<!-- Tailor Search -->
<div class="card p-3 mb-3">
<h5>Find Tailors by City</h5>
<input id="citySearch" class="form-control mb-2" placeholder="Enter city">
<button class="btn btn-primary" onclick="searchTailors()">Search</button>
<ul id="tailorList" class="mt-2"></ul>
</div>

<!-- Chat UI -->
<div class="card p-3 mb-3">
<h5>Chat</h5>
<input id="sender" class="form-control mb-2" placeholder="Your ID (ex: 1)">
<input id="receiver" class="form-control mb-2" placeholder="Tailor ID (ex: 2)">
<div class="chat-box mb-2" id="chatBox"></div>
<input id="msg" class="form-control mb-2" placeholder="Type message">
<button class="btn btn-success" onclick="sendMsg()">Send</button>
<button class="btn btn-secondary mt-2" onclick="loadChat()">Load Conversation</button>
</div>

</div>

<script>
function ask(){
 fetch("/fabric/ask", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     fabricDescription: desc.value,
     fabricImageUrl: imgUrl.value
   })
 }).then(r=>r.json())
 .then(d=>{
   suggestion.innerText = "✨ " + d.suggestion;
   loadHistory();
 });
}

function loadHistory(){
 fetch("/fabric/history")
 .then(r=>r.json())
 .then(list=>{
   history.innerHTML="";
   list.slice().reverse().forEach(item=>{
     const div=document.createElement("div");
     div.className="border p-2 mb-2 rounded bg-white";
     div.innerHTML=`
       <strong>${item.fabricDescription}</strong><br>
       ${item.suggestion}<br>
       ${item.fabricImageUrl ? `<img src="${item.fabricImageUrl}" width="120" class="mt-1"/>` : ""}
     `;
     history.appendChild(div);
   });
 });
}

function searchTailors(){
 fetch("/tailors/city/"+citySearch.value)
 .then(r=>r.json())
 .then(list=>{
   tailorList.innerHTML="";
   list.forEach(t=>{
     const li=document.createElement("li");
     li.innerText=`${t.name} | ${t.city} | Skills: ${t.skills} | ₹${t.startingPrice}`;
     tailorList.appendChild(li);
   });
 });
}

function sendMsg(){
 fetch("/chat/send",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     senderId: sender.value,
     receiverId: receiver.value,
     message: msg.value
   })
 }).then(()=>{
   msg.value="";
   loadChat();
 });
}

function loadChat(){
 fetch(`/chat/conversation?sender=${sender.value}&receiver=${receiver.value}`)
 .then(r=>r.json())
 .then(list=>{
   chatBox.innerHTML="";
   list.forEach(m=>{
     const div=document.createElement("div");
     div.className = m.senderId == sender.value ? "msg-right" : "msg-left";
     div.innerText = m.message;
     chatBox.appendChild(div);
   });
 });
}
</script>

</body>
</html>
